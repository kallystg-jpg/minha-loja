<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja de Roupas</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:black;color:white;padding:20px;text-align:center}
nav{background:#222;padding:10px;text-align:center}
nav a{color:white;margin:0 15px;text-decoration:none}
.container{padding:40px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:white;padding:15px;border-radius:10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.card img{width:100%;border-radius:10px}
button{background:black;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer}
footer{background:#111;color:white;text-align:center;padding:20px;margin-top:40px}
</style>
</head>
<body>

<header>
<h1>Minha Loja de Roupas</h1>
<p>Estilo moderno para todos</p>
</header>

<nav>
<a href="#">Início</a>
<a href="#">Produtos</a>
<a href="#">Contato</a>
</nav>

<div class="container">
<h2>Produtos</h2>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/300x300" alt="Camiseta">
<h3>Camiseta Street</h3>
<p>R$ 79,90</p>
<button>Comprar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x300" alt="Moletom">
<h3>Moletom Urban</h3>
<p>R$ 149,90</p>
<button>Comprar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x300" alt="Calça">
<h3>Calça Jeans</h3>
<p>R$ 129,90</p>
<button>Comprar</button>
</div>

</div>
</div>

<footer>
<p>© 2026 Minha Loja de Roupas</p>
</footer>

</body>
</html>
