<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kallys Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#f4f4f4;
}

/* HEADER */

header{
background:#000;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
}

.logo{
font-size:22px;
font-weight:600;
}

nav{
display:flex;
gap:15px;
align-items:center;
}

nav button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* LOGIN MODAL */

.loginModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
align-items:center;
justify-content:center;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

.loginBox input{
width:100%;
padding:8px;
margin:5px 0;
}

/* PRODUTOS */

.section{
padding:40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

/* ADMIN */

.admin{
display:none;
background:white;
padding:30px;
margin:40px;
border-radius:10px;
}

</style>
</head>

<body>

<header>

<div class="logo">Kallys</div>

<nav>

<button onclick="toggleCart()">🛒 Carrinho</button>

<button onclick="openLogin()">Login</button>

<button onclick="logout()">Sair</button>

</nav>

</header>

<section class="section">

<div class="products" id="product-list"></div>

</section>

<!-- LOGIN -->

<div class="loginModal" id="loginModal">

<div class="loginBox">

<h3>Login</h3>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Senha">

<button onclick="loginEmail()">Entrar</button>

<br><br>

<button onclick="loginGoogle()">Login com Google</button>

<br><br>

<button onclick="register()">Criar Conta</button>

<br><br>

<button onclick="closeLogin()">Fechar</button>

</div>

</div>

<!-- ADMIN PANEL -->

<div class="admin" id="adminPanel">

<h3>Painel Admin</h3>

<input id="pname" placeholder="Nome produto">

<input id="pprice" placeholder="Preço">

<input id="pimg" placeholder="URL imagem">

<br><br>

<button onclick="addProduct()">Adicionar</button>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "SUA_API_KEY",
authDomain: "SEU_DOMINIO",
projectId: "SEU_ID",

};

firebase.initializeApp(firebaseConfig)

const auth = firebase.auth()

/* LOGIN MODAL */

function openLogin(){
document.getElementById("loginModal").style.display="flex"
}

function closeLogin(){
document.getElementById("loginModal").style.display="none"
}

/* LOGIN EMAIL */

function loginEmail(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

auth.signInWithEmailAndPassword(email,pass)

}

/* REGISTRO */

function register(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

auth.createUserWithEmailAndPassword(email,pass)

.then(user=>{

user.user.sendEmailVerification()

alert("Verifique seu email")

})

}

/* GOOGLE LOGIN */

function loginGoogle(){

const provider=new firebase.auth.GoogleAuthProvider()

auth.signInWithPopup(provider)

}

/* LOGOUT */

function logout(){

auth.signOut()

}

/* ADMIN LOGIN */

auth.onAuthStateChanged(user=>{

if(!user) return

let email=user.email

if(email==="admcalaigian53"){

document.getElementById("adminPanel").style.display="block"

}

})

/* PRODUTOS */

let products=[

{name:"Camiseta Street",price:79,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"}

]

function loadProducts(){

let container=document.getElementById("product-list")

container.innerHTML=""

products.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<p>R$${p.price}</p>

<button onclick="editProduct(${i})">Editar</button>

<button onclick="deleteProduct(${i})">Deletar</button>

</div>

</div>

`

})

}

loadProducts()

function addProduct(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value
let img=document.getElementById("pimg").value

products.push({name,price,img})

loadProducts()

}

function deleteProduct(i){

products.splice(i,1)

loadProducts()

}

function editProduct(i){

let name=prompt("Novo nome")
let price=prompt("Novo preço")

products[i].name=name
products[i].price=price

loadProducts()

}

</script>

</body>
</html>
