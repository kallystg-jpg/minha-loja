<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kallys Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#f4f4f4;
}

/* HEADER */

header{
background:#000;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
}

.logo img{
height:40px;
}

nav{
display:flex;
align-items:center;
gap:15px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
}

/* MENU CATEGORIA */

.dropdown{
position:relative;
}

.dropdown-menu{
display:none;
position:absolute;
background:#000;
top:25px;
border-radius:6px;
}

.dropdown-menu a{
display:block;
padding:10px;
}

.dropdown:hover .dropdown-menu{
display:block;
}

/* SEARCH */

.search{
padding:6px;
border-radius:5px;
border:none;
}

/* HERO */

.hero{
background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1400');
background-size:cover;
background-position:center;
height:300px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
text-shadow:0 4px 10px rgba(0,0,0,.6);
}

/* PRODUTOS */

.section{
padding:40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-weight:600;
margin:10px 0;
}

.size-select{
width:100%;
padding:5px;
}

/* CORES */

.color{
width:16px;
height:16px;
border-radius:50%;
display:inline-block;
margin-right:5px;
}

/* BOTÕES */

button{
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

.cart{
background:black;
color:white;
}

.buy{
background:#25D366;
color:white;
}

/* RATING */

.rating{
color:gold;
}

/* CARRINHO */

.cart-panel{
position:fixed;
right:20px;
bottom:20px;
width:320px;
background:white;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
padding:20px;
display:none;
max-height:400px;
overflow:auto;
}

.cart-item{
border-bottom:1px solid #eee;
padding:8px 0;
}

/* ADMIN */

.admin{
background:white;
padding:20px;
margin:40px;
border-radius:8px;
}

.admin input{
padding:6px;
margin:5px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:16px;
border-radius:50%;
font-size:24px;
text-decoration:none;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:40px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo-kallys.png">
</div>

<nav>

<a href="#">Início</a>

<div class="dropdown">

<a href="#">Produtos ▾</a>

<div class="dropdown-menu">
<a href="#">Masculino</a>
<a href="#">Feminino</a>
<a href="#">Infantil</a>
<a href="#">Geek</a>
<a href="#">LGBT+</a>
</div>

</div>

<input class="search" placeholder="Buscar..." onkeyup="searchProduct(this.value)">

<button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>

</nav>

</header>

<div class="hero">

<h2>Kallys Streetwear</h2>
<p>Nova coleção</p>

</div>

<section class="section">

<div class="products" id="product-list"></div>

</section>

<div class="cart-panel" id="cart-panel">

<h3>Carrinho</h3>

<div id="cart-items"></div>

<p id="cart-total">Total: R$0</p>

<input placeholder="CEP para frete">

<br><br>

<button onclick="buyAll()" class="buy">Comprar no WhatsApp</button>

</div>

<section class="admin">

<h3>Painel Admin</h3>

<input id="pname" placeholder="Produto">
<input id="pprice" placeholder="Preço">
<input id="pimg" placeholder="Imagem URL">

<button onclick="addProduct()">Adicionar Produto</button>

</section>

<a class="whatsapp" href="https://wa.me/555191345783">💬</a>

<footer>

<p>© 2026 Kallys Store</p>

</footer>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[
{name:"Camiseta Street",price:79,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"}
]

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function loadProducts(){

let container=document.getElementById("product-list")

container.innerHTML=""

products.forEach(p=>{

container.innerHTML+=`

<div class="card" data-name="${p.name.toLowerCase()}">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<div class="price">R$${p.price}</div>

<select class="size-select">
<option>P</option>
<option>M</option>
<option>G</option>
<option>GG</option>
</select>

<div class="rating">★★★★★</div>

<br>

<button class="cart" onclick="addToCart('${p.name}',${p.price})">Carrinho</button>

<button class="buy" onclick="buyWhats('${p.name}')">WhatsApp</button>

</div>

</div>

`

})

}

loadProducts()

function addProduct(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value
let img=document.getElementById("pimg").value

products.push({name,price,img})

localStorage.setItem("products",JSON.stringify(products))

loadProducts()

}

/* CARRINHO */

function toggleCart(){

let panel=document.getElementById("cart-panel")

panel.style.display=panel.style.display==="block"?"none":"block"

}

function addToCart(name,price){

cart.push({name,price})

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

function renderCart(){

let items=document.getElementById("cart-items")

items.innerHTML=""

let total=0

cart.forEach((item,i)=>{

items.innerHTML+=`<div class="cart-item">${item.name} - R$${item.price} <button onclick="removeItem(${i})">X</button></div>`

total+=Number(item.price)

})

document.getElementById("cart-total").innerText="Total: R$"+total

document.getElementById("cart-count").innerText=cart.length

}

renderCart()

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

/* WHATSAPP */

function buyWhats(product){

const phone='555191345783'

window.open(`https://wa.me/${phone}?text=Olá quero comprar ${product}`)

}

function buyAll(){

const phone='555191345783'

let msg="Olá quero comprar:%0A"

cart.forEach(p=>{

msg+=`- ${p.name} R$${p.price}%0A`

})

window.open(`https://wa.me/${phone}?text=${msg}`)

}

/* BUSCA */

function searchProduct(text){

text=text.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.dataset.name

card.style.display=name.includes(text)?"block":"none"

})

}

</script>

</body>
</html>
