<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Loja de Roupas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f6f6f6;color:#222}

header{
background:#000;
color:#fff;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center
}

header h1{font-size:22px}

nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-size:14px
}

.cart-icon{
position:relative;
font-size:18px
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
border-radius:50%;
font-size:12px;
padding:2px 6px
}

.hero{
background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1200');
background-size:cover;
background-position:center;
height:320px;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:34px;
font-weight:600;
text-shadow:0 3px 10px rgba(0,0,0,.5)
}

.container{padding:40px}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
transition:.25s
}

.card:hover{transform:translateY(-6px)}

.card img{width:100%;height:220px;object-fit:cover}

.card-content{padding:15px}

.price{font-weight:600;margin:10px 0;font-size:18px}

button{
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
font-weight:500
}

.buy{background:#25D366;color:white}
.cart{background:#000;color:white}

.cart-panel{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-4px 0 20px rgba(0,0,0,.2);
padding:20px;
overflow:auto
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
font-size:14px
}

.cart-total{
font-weight:600;
margin-top:20px;
font-size:18px
}

.buy-all{
margin-top:15px;
width:100%;
background:#25D366;
color:white;
padding:12px
}

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:26px;
padding:15px 18px;
border-radius:50%;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-decoration:none
}

footer{
margin-top:40px;
padding:30px;
text-align:center;
background:#111;
color:white
}
</style>
</head>

<body>

<header>
<h1>Minha Loja</h1>
<nav>
<a href="#">Início</a>
<a href="#produtos">Produtos</a>
<span class="cart-icon">🛒 <span class="cart-count" id="cart-count">0</span></span>
</nav>
</header>

<div class="hero">
Nova coleção
</div>

<div class="container" id="produtos">
<h2 style="margin-bottom:25px">Produtos</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=600">
<div class="card-content">
<h3>Camiseta Street</h3>
<div class="price">R$79</div>
<button class="cart" onclick="addToCart('Camiseta Street',79)">Adicionar</button>
<button class="buy" onclick="buyWhats('Camiseta Street')">WhatsApp</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=600">
<div class="card-content">
<h3>Moletom Urban</h3>
<div class="price">R$149</div>
<button class="cart" onclick="addToCart('Moletom Urban',149)">Adicionar</button>
<button class="buy" onclick="buyWhats('Moletom Urban')">WhatsApp</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?q=80&w=600">
<div class="card-content">
<h3>Calça Jeans</h3>
<div class="price">R$129</div>
<button class="cart" onclick="addToCart('Calça Jeans',129)">Adicionar</button>
<button class="buy" onclick="buyWhats('Calça Jeans')">WhatsApp</button>
</div>
</div>

</div>
</div>

<div class="cart-panel">
<h3>Carrinho</h3>
<div id="cart-items"></div>
<div class="cart-total" id="cart-total">Total: R$0</div>
<button class="buy-all" onclick="buyAll()">Comprar tudo no WhatsApp</button>
</div>

<a class="whatsapp-float" href="https://wa.me/555191345783" target="_blank">💬</a>

<footer>
<p>© 2026 Minha Loja de Roupas</p>
</footer>

<script>

let cart=[]

function addToCart(name,price){
cart.push({name,price})
renderCart()
}

function renderCart(){

const items=document.getElementById('cart-items')
items.innerHTML=''

let total=0

cart.forEach(item=>{
items.innerHTML+=`<div class="cart-item">${item.name} - R$${item.price}</div>`
total+=item.price
})

document.getElementById('cart-total').innerText='Total: R$'+total
document.getElementById('cart-count').innerText=cart.length

}

function buyWhats(product){

const phone='555191345783'

const text=`Olá quero comprar: ${product}`

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`,'_blank')

}

function buyAll(){

const phone='555191345783'

if(cart.length===0){
alert('Seu carrinho está vazio')
return
}

let message='Olá quero comprar:%0A'

cart.forEach(item=>{
message+=`- ${item.name} R$${item.price}%0A`
})

window.open(`https://wa.me/${phone}?text=${message}`)

}

</script>

</body>
</html>
