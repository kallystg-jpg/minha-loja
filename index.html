<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kallys Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#f4f4f4;
}

/* HEADER */

header{
background:#000;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
}

.logo{
font-size:22px;
font-weight:600;
}

nav{
display:flex;
gap:15px;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
}

.search{
padding:6px;
border-radius:5px;
border:none;
}

/* CATEGORIAS */

.dropdown{
position:relative;
}

.dropdown-menu{
display:none;
position:absolute;
background:#000;
top:25px;
border-radius:6px;
}

.dropdown-menu a{
display:block;
padding:10px;
}

.dropdown:hover .dropdown-menu{
display:block;
}

/* HERO */

.hero{
background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1400');
background-size:cover;
background-position:center;
height:300px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

/* PRODUTOS */

.section{
padding:40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-weight:600;
margin:10px 0;
}

.rating{
color:gold;
}

/* BOTÕES */

button{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.cart{
background:black;
color:white;
}

.buy{
background:#25D366;
color:white;
}

/* CARRINHO */

.cart-panel{
position:fixed;
right:20px;
bottom:20px;
width:320px;
background:white;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
padding:20px;
display:none;
max-height:400px;
overflow:auto;
}

.cart-item{
border-bottom:1px solid #eee;
padding:8px 0;
}

/* LOGIN MODAL */

.loginModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
align-items:center;
justify-content:center;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

.loginBox input{
width:100%;
padding:8px;
margin:5px 0;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:16px;
border-radius:50%;
font-size:24px;
text-decoration:none;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:40px;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<div class="logo">Kallys</div>

<nav>

<a href="#">Início</a>

<div class="dropdown">

<a href="#">Produtos ▾</a>

<div class="dropdown-menu">

<a href="#">Masculino</a>
<a href="#">Feminino</a>
<a href="#">Infantil</a>
<a href="#">Geek</a>
<a href="#">LGBT+</a>

</div>

</div>

<input class="search" placeholder="Buscar..." onkeyup="searchProduct(this.value)">

<button onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>

<button onclick="openLogin()">Login</button>

</nav>

</header>

<div class="hero">

<h2>Kallys Streetwear</h2>
<p>Nova coleção</p>

</div>

<section class="section">

<div class="products" id="product-list"></div>

</section>

<div class="cart-panel" id="cart-panel">

<h3>Carrinho</h3>

<div id="cart-items"></div>

<p id="cart-total">Total: R$0</p>

<input placeholder="CEP para frete">

<br><br>

<button onclick="buyAll()" class="buy">Comprar no WhatsApp</button>

</div>

<!-- LOGIN -->

<div class="loginModal" id="loginModal">

<div class="loginBox">

<h3>Login</h3>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<br><br>

<button onclick="closeLogin()">Fechar</button>

</div>

</div>

<a class="whatsapp" href="https://wa.me/555191345783">💬</a>

<footer>

<p>© 2026 Kallys Store</p>

</footer>

<script>

let products=[

{name:"Camiseta Street",price:79,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{name:"Moletom Urban",price:149,img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"},
{name:"Calça Jeans",price:129,img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246"}

]

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function loadProducts(){

let container=document.getElementById("product-list")

container.innerHTML=""

products.forEach(p=>{

container.innerHTML+=`

<div class="card" data-name="${p.name.toLowerCase()}">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<div class="price">R$${p.price}</div>

<div class="rating">★★★★★</div>

<br>

<button class="cart" onclick="addToCart('${p.name}',${p.price})">Carrinho</button>

<button class="buy" onclick="buyWhats('${p.name}')">WhatsApp</button>

</div>

</div>

`

})

}

loadProducts()

function toggleCart(){

let panel=document.getElementById("cart-panel")

panel.style.display=panel.style.display==="block"?"none":"block"

}

function addToCart(name,price){

cart.push({name,price})

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

function renderCart(){

let items=document.getElementById("cart-items")

items.innerHTML=""

let total=0

cart.forEach((item,i)=>{

items.innerHTML+=`<div class="cart-item">${item.name} - R$${item.price} <button onclick="removeItem(${i})">X</button></div>`

total+=item.price

})

document.getElementById("cart-total").innerText="Total: R$"+total

document.getElementById("cart-count").innerText=cart.length

}

renderCart()

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

function buyWhats(product){

const phone='555191345783'

window.open(`https://wa.me/${phone}?text=Olá quero comprar ${product}`)

}

function buyAll(){

const phone='555191345783'

let msg="Olá quero comprar:%0A"

cart.forEach(p=>{

msg+=`- ${p.name} R$${p.price}%0A`

})

window.open(`https://wa.me/${phone}?text=${msg}`)

}

function searchProduct(text){

text=text.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let name=card.dataset.name

card.style.display=name.includes(text)?"block":"none"

})

}

/* LOGIN */

function openLogin(){

document.getElementById("loginModal").style.display="flex"

}

function closeLogin(){

document.getElementById("loginModal").style.display="none"

}

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

if(email==="admcalaigian53" && pass==="admcalai59"){

alert("Login administrador realizado")

}

else{

alert("Login cliente realizado")

}

closeLogin()

}

</script>

</body>
</html>
