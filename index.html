<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kallys Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#f5f5f5;
color:#222;
}

/* HEADER */

header{
background:#000;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
}

.header-left{
display:flex;
align-items:center;
gap:25px;
}

.logo img{
height:40px;
}

/* MENU */

nav{
display:flex;
align-items:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-size:14px;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdown-menu{
display:none;
position:absolute;
background:#000;
top:25px;
border-radius:6px;
min-width:150px;
}

.dropdown-menu a{
display:block;
padding:10px 15px;
}

.dropdown:hover .dropdown-menu{
display:block;
}

/* CARRINHO */

.cart-button{
background:#111;
padding:6px 14px;
border-radius:30px;
cursor:pointer;
position:relative;
}

.cart-count{
position:absolute;
top:-6px;
right:-8px;
background:red;
color:white;
border-radius:50%;
font-size:11px;
padding:2px 6px;
}

/* HERO */

.hero{
background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1400');
background-size:cover;
background-position:center;
height:350px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
text-shadow:0 4px 10px rgba(0,0,0,.6);
}

.hero h2{
font-size:36px;
}

/* PRODUTOS */

.section{
padding:50px 40px;
}

.section-title{
font-size:24px;
margin-bottom:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,.08);
transition:.25s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-weight:600;
margin:10px 0;
}

button{
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

.cart{
background:black;
color:white;
}

.buy{
background:#25D366;
color:white;
margin-left:5px;
}

/* CARRINHO LATERAL */

.cart-panel{
position:fixed;
right:20px;
bottom:20px;
background:white;
width:320px;
max-height:420px;
overflow:auto;
border-radius:10px;
padding:20px;
display:none;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.cart-item{
border-bottom:1px solid #eee;
padding:8px 0;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50%;
font-size:24px;
text-decoration:none;
}

/* FOOTER */

footer{
background:#111;
color:white;
padding:40px;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="header-left">

<div class="logo">
<img src="logo-kallys.png">
</div>

<div class="cart-button" onclick="toggleCart()">
🛒
<span class="cart-count" id="cart-count">0</span>
</div>

</div>

<nav>

<a href="#">Início</a>

<div class="dropdown">
<a href="#">Produtos ▾</a>

<div class="dropdown-menu">
<a href="#masculino">Masculino</a>
<a href="#feminino">Feminino</a>
<a href="#infantil">Infantil</a>
<a href="#geek">Geek</a>
<a href="#lgbt">LGBT+</a>
</div>

</div>

</nav>

</header>

<div class="hero">
<h2>Nova coleção Kallys</h2>
<p>Streetwear moderno</p>
</div>

<section class="section" id="produtos">

<h3 class="section-title">Produtos</h3>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<div class="card-content">
<h3>Camiseta Street</h3>
<div class="price">R$79</div>
<button class="cart" onclick="addToCart('Camiseta Street',79)">Carrinho</button>
<button class="buy" onclick="buyWhats('Camiseta Street')">WhatsApp</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<div class="card-content">
<h3>Moletom Urban</h3>
<div class="price">R$149</div>
<button class="cart" onclick="addToCart('Moletom Urban',149)">Carrinho</button>
<button class="buy" onclick="buyWhats('Moletom Urban')">WhatsApp</button>
</div>
</div>

</div>

</section>

<div class="cart-panel" id="cart-panel">

<h3>Carrinho</h3>

<div id="cart-items"></div>

<p id="cart-total">Total: R$0</p>

<button onclick="buyAll()" class="buy">Comprar tudo</button>

</div>

<a class="whatsapp" href="https://wa.me/555191345783">💬</a>

<footer>

<p>© 2026 Kallys Store</p>

</footer>

<script>

let cart=[]

function toggleCart(){

let panel=document.getElementById('cart-panel')

panel.style.display=panel.style.display==='block'?'none':'block'

}

function addToCart(name,price){

cart.push({name,price})

renderCart()

}

function renderCart(){

let items=document.getElementById('cart-items')

items.innerHTML=''

let total=0

cart.forEach((item,index)=>{

items.innerHTML+=`<div class="cart-item">${item.name} - R$${item.price}</div>`

total+=item.price

})

document.getElementById('cart-total').innerText="Total: R$"+total

document.getElementById('cart-count').innerText=cart.length

}

function buyWhats(product){

const phone='555191345783'

const text=`Olá quero comprar ${product}`

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`)

}

function buyAll(){

const phone='555191345783'

let message="Olá quero comprar:%0A"

cart.forEach(item=>{

message+=`- ${item.name} R$${item.price}%0A`

})

window.open(`https://wa.me/${phone}?text=${message}`)

}

</script>

</body>
</html>
